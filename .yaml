resources:
  jobs:
    Pipeline_De_Execução:
      name: "Pipeline De Execução "
      tasks:
        - task_key: bronze
          notebook_task:
            notebook_path: /Workspace/Users/igoreor24@gmail.com/atividade_rocket/bronze/Atividade_land_to_bronze.ipynb
            base_parameters:
              data_inicio: 01-01-2017
              data_fim: 12-31-2018
            source: WORKSPACE
          environment_key: Default
        - task_key: silver
          depends_on:
            - task_key: bronze
          notebook_task:
            notebook_path: /Workspace/Users/igoreor24@gmail.com/atividade_rocket/silver/Atividade_bronze_to_silver.ipynb
            source: WORKSPACE
          environment_key: Default
        - task_key: gold
          depends_on:
            - task_key: silver
          notebook_task:
            notebook_path: /Workspace/Users/igoreor24@gmail.com/atividade_rocket/gold/Atividade_silver_to_gold.ipynb
            source: WORKSPACE
          environment_key: Default
      queue:
        enabled: true
      environments:
        - environment_key: Default
          spec:
            environment_version: "5"
      performance_target: PERFORMANCE_OPTIMIZED